<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartPay Merchant CRM</title>

  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="SmartPay Merchant CRM" />

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #0f172a;
    }

    .loader {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, .35), transparent 35%),
        radial-gradient(circle at top right, rgba(124, 58, 237, .28), transparent 35%),
        #0f172a;
      color: #fff;
      z-index: 2;
      transition: opacity .25s ease, visibility .25s ease;
    }

    .loader.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .box {
      width: min(420px, calc(100% - 32px));
      padding: 28px;
      border-radius: 28px;
      background: rgba(255, 255, 255, .08);
      border: 1px solid rgba(255, 255, 255, .14);
      box-shadow: 0 30px 90px rgba(0, 0, 0, .28);
      text-align: center;
      backdrop-filter: blur(18px);
    }

    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #38bdf8, #2563eb, #7c3aed);
      font-size: 28px;
      font-weight: 900;
      box-shadow: 0 18px 45px rgba(37, 99, 235, .35);
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      letter-spacing: -.04em;
    }

    p {
      margin: 10px 0 0;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.5;
    }

    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid rgba(255, 255, 255, .22);
      border-top-color: #fff;
      border-radius: 999px;
      margin: 22px auto 0;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #f5f7fb;
      z-index: 1;
    }

    .fallback {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: 14px;
      z-index: 3;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(15, 23, 42, .92);
      color: white;
      font-size: 13px;
      box-shadow: 0 16px 45px rgba(0, 0, 0, .25);
    }

    .fallback a {
      color: #93c5fd;
      font-weight: 800;
      text-decoration: none;
    }

    @media (max-width: 640px) {
      .fallback {
        display: flex;
      }
    }
  </style>
</head>

<body>
  <div id="loader" class="loader">
    <div class="box">
      <div class="logo">S</div>
      <h1>SmartPay Merchant CRM</h1>
      <p>Загружаем программу из Google Apps Script...</p>
      <div class="spinner"></div>
    </div>
  </div>

  <iframe
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbzwz7x9LAsOn8G2VmUDcDySjFoBAHLnrSTe4NYZ154MWvCjrhMMdwWOL9Fj5KETR6Tn/exec"
    allow="clipboard-read; clipboard-write"
    title="SmartPay Merchant CRM"
  ></iframe>

  <div class="fallback">
    Если страница не открылась:
    <a href="https://script.google.com/macros/s/AKfycbzwz7x9LAsOn8G2VmUDcDySjFoBAHLnrSTe4NYZ154MWvCjrhMMdwWOL9Fj5KETR6Tn/exec" target="_blank" rel="noopener">открыть CRM напрямую</a>
  </div>

  <script>
    const loader = document.getElementById('loader');
    const frame = document.getElementById('appFrame');

    frame.addEventListener('load', () => {
      setTimeout(() => loader.classList.add('hidden'), 500);
    });

    setTimeout(() => {
      loader.classList.add('hidden');
    }, 4500);
  </script>
</body>
</html>
