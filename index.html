function fmtDate(v){
  if(!v) return "";
  const s=String(v).trim();
  // Без new Date(): дата должна показываться ровно так, как указана в Google Sheets.
  let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return `${m[3]}.${m[2]}.${m[1]}`;
  m=s.match(/^(\d{1,2})[.\/](\d{1,2})[.\/](\d{4})/);
  if(m) return `${m[1].padStart(2,"0")}.${m[2].padStart(2,"0")}.${m[3]}`;
  m=s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})/);
  if(m) return `${m[1].padStart(2,"0")}.${m[2].padStart(2,"0")}.${m[3]}`;
  return s.replace(/\sGMT.*$/," ").replace(/T.*$/," ").trim();
}

async function api(action,payload={}){
  if(!CONFIG.API_URL){
    if(CONFIG.DEMO_IF_NO_API) return demo;
    throw new Error("API_URL пустой");
  }
  const res = await fetch(CONFIG.API_URL, {
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify({action,...payload})
  });
  const data = await res.json();
  if(!data.ok) throw new Error(data.message || "Ошибка API");
  return data;
}

async function loadData(){
  try{
    showLoader(true);
    const data = await api("getData");
    state.merchants = Array.isArray(data.merchants) ? data.merchants : [];
    state.tasks = Array.isArray(data.tasks) ? data.tasks : [];
    state.history = Array.isArray(data.history) ? data.history : [];
    state._loadedFromApi = true;
    render();
  }catch(e){
    console.error(e);
    // Важно: при ошибке после редактирования задачи НЕ затираем реальные данные демо-данными.
    if(state._loadedFromApi || (state.merchants && state.merchants.length)){
      toast("Ошибка обновления данных. Текущий список оставлен без изменений.");
      render();
    } else if(!CONFIG.API_URL && CONFIG.DEMO_IF_NO_API){
      toast(t("loadingDemo"));
      state.merchants=demo.merchants;state.tasks=demo.tasks;state.history=demo.history;render();
    } else {
      toast("Не удалось загрузить данные: " + (e.message || e));
      state.merchants=[];state.tasks=[];state.history=[];render();
    }
  }finally{showLoader(false)}
}

function normalizeFilterValue(v){return String(v||"").trim().toLowerCase()}
function statusSortWeight(status){
  const s=String(status||"").trim().toLowerCase();
  if(s.includes("актив")||s.includes("фаъол")) return 0;
  if(s.includes("интеграц")||s.includes("тест")) return 2;
  if(s.includes("процесс")||s.includes("раванд")) return 3;
  if(s.includes("работ")||s.includes("кор")) return 4;
  if(s.includes("ожид")) return 5;
  if(s.includes("нет ответа")||s.includes("ҷавоб")) return 6;
  if(s.includes("проблем")||s.includes("мушкил")) return 7;
  if(s.includes("заморож")) return 8;
  return 9;
}
function prioritySortWeight(priority){
  const s=String(priority||"").trim().toLowerCase();
  if(s.includes("выс")||s.includes("баланд")) return 0;
  if(s.includes("сред")||s.includes("миёна")) return 1;
  if(s.includes("низ")||s.includes("паст")) return 2;
  return 3;
}
function sortMerchants(list){
  return [...list].sort((a,b)=>{
    const sw=statusSortWeight(a.status)-statusSortWeight(b.status);
    if(sw) return sw;
    const pw=prioritySortWeight(a.priority)-prioritySortWeight(b.priority);
    if(pw) return pw;
    return String(a.merchant||"").localeCompare(String(b.merchant||""), 'ru');
  });
}

function safeUrl(url){
  let v=String(url||"").trim();
  if(!v) return "";
  if(v.startsWith("@")) v="https://t.me/"+v.slice(1);
  else if(/^t\.me\//i.test(v) || /^telegram\.me\//i.test(v)) v="https://"+v;
  else if(!/^https?:\/\//i.test(v) && !/^tel:/i.test(v)) v="https://"+v;
  return v.replace(/"/g,"%22");
}
function normalizePhoneForTel(phone){
  const raw=String(phone||"").trim();
  if(!raw) return "";
  const digits=raw.replace(/[^0-9+]/g,"");
  if(digits.startsWith("+")) return digits;
  if(digits.length===9) return "+992"+digits;
  return digits;
}

function parseAnyDate(v){
  const s=String(v||"").trim();
  if(!s) return null;
  let m=s.match(/^(\d{2})[.\/-](\d{2})[.\/-](\d{4})/);
  if(m) return new Date(Number(m[3]),Number(m[2])-1,Number(m[1]));
  m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return new Date(Number(m[1]),Number(m[2])-1,Number(m[3]));
  const d=new Date(s);
  return isNaN(d)?null:d;
}
function monthLabel(d){return String(d.getMonth()+1).padStart(2,"0")+"."+d.getFullYear()}
function countContractsByMonth(sortMode=state.contractMonthSort||"date"){
  const out={};
  state.merchants.forEach(m=>{
    if(!(m.contractNumber||m.contractDate)) return;
    const d=parseAnyDate(m.contractDate);
    const key=d?monthLabel(d):t("notSpecified");
    out[key]=(out[key]||0)+1;
  });
  const entries=Object.entries(out);
  const dateKey=(label)=>{
    const parts=String(label).split('.').map(Number);
    if(parts.length>=2 && parts[0] && parts[1]) return parts[1]*100+parts[0];
    return -1;
  };
  entries.sort((a,b)=>{
    if(sortMode==="count") return Number(b[1])-Number(a[1]) || dateKey(b[0])-dateKey(a[0]);
    return dateKey(b[0])-dateKey(a[0]) || Number(b[1])-Number(a[1]);
  });
  return Object.fromEntries(entries);
}
function setContractMonthSort(value){

function contractsThisMonth(){

function filterByContractPeriod(list,from,to){
  const fd=from?parseAnyDate(from):null, td=to?parseAnyDate(to):null;

  return list.filter(m=>{const d=parseAnyDate(m.contractDate); if(!d) return false; if(fd && d<fd) return false; if(td && d>td) return false; return true;});
}

function chartPanel(title,obj,trunc=false,mini=false,controls="",preserveOrder=false){
  const key=chartKey(title);
  const expanded=!!state.expandedCharts[key];
  let entries=Object.entries(obj).filter(([,v])=>Number(v)>0);
  if(!preserveOrder){
    entries=entries.sort((a,b)=>b[1]-a[1]);
  }
  const max=Math.max(1,...entries.map(([,v])=>Number(v)));
  const total=entries.reduce((a,[,v])=>a+Number(v),0);
  const visible=(mini && !expanded)?entries.slice(0,6):entries;
  if(!visible.length){
    return `<section class="panel"><div class="panel-head"><h3>${title}</h3></div><div class="empty">${t("noData")}</div></section>`;
  }
  const rows=visible.map(([k,v])=>{
    const value=Number(v);
    const pct=total?Math.round(value/total*100):0;
    const label=String(k||t("notSpecified"));
    const shortLabel=trunc && label.length>22 ? label.slice(0,22)+"..." : label;
    return `<div class="bar">
      <div class="bar-top"><span class="bar-label" title="${esc(label)}">${esc(shortLabel)}</span><span class="bar-value">${value} · ${pct}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.max(3,value/max*100)}%"></div></div>
    </div>`;
  }).join("");
  const more=entries.length>6 ? `<div class="chart-note"><button onclick="toggleChart('${esc(key)}')">${expanded?t("hide"):`+ ${entries.length-6} ${t("moreItems")} · ${t("showAll")}`}</button></div>` : "";
  return `<section class="panel chart-panel"><div class="panel-head"><h3>${title}</h3>${controls||""}</div><div class="chart-summary"><div><b>${total}</b><br><span>${t("totalRecords")}</span></div><span>${t("barChartHint")}</span></div><div class="chart-list">${rows}</div>${more}</section>`;
}

function field(name,label,value="",type="text"){return `<div class="field"><label>${esc(label)}</label><input name="${name}" type="${type}" value="${esc(value)}"></div>`}
function textareaField(name,label,value=""){return `<div class="field"><label>${esc(label)}</label><textarea name="${name}">${esc(value)}</textarea></div>`}
function selectField(name,label,value,options){return `<div class="field"><label>${esc(label)}</label><select name="${name}">${options.map(o=>`<option ${o===value?'selected':''}>${esc(o)}</option>`).join("")}</select></div>`}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(String(reader.result||"").split(",").pop());
    reader.onerror=()=>reject(new Error("Не удалось прочитать файл логотипа"));
    reader.readAsDataURL(file);
  });
}

async function saveMerchant(id){
  const card=qs("#modalCard");
  let valid=true;
  card.querySelectorAll("[data-required='1']").forEach(el=>{
    const empty=!String(el.value||"").trim();
    const combo=el.closest('.combo-field');
    if(combo){
      const sel=combo.querySelector('[data-combo-select]');
      const custom=combo.querySelector('[data-combo-custom]');
      const bad=!String(combo.querySelector('input[type="hidden"]').value||"").trim();
      sel.classList.toggle("invalid", bad && sel.value!=="__custom__");
      custom.classList.toggle("invalid", bad && sel.value==="__custom__");
      if(bad) valid=false;
      return;
    }
    el.classList.toggle("invalid", empty);
    if(empty) valid=false;
  });
  if(!valid){ toast(t("requiredError")); return; }
  const obj={id};
  card.querySelectorAll("[name]").forEach(el=>obj[el.name]=el.value);
  obj.user=(currentUser()?.fio||currentUser()?.login||"Пользователь");
  const logoFile=card.querySelector("#merchantLogoFile")?.files?.[0];
  if(logoFile){
    const allowed=["image/png","image/jpeg","image/jpg","image/webp"];
    if(!allowed.includes(logoFile.type)){toast("Разрешены только PNG, JPG, JPEG, WEBP");return;}
    if(logoFile.size>2*1024*1024){toast("Логотип должен быть до 2 МБ");return;}
    obj.logoBase64=await fileToBase64(logoFile);
    obj.logoFileName=logoFile.name;
    obj.logoMimeType=logoFile.type;
  }
  const pdfFile=card.querySelector("#contractPdfFile")?.files?.[0];
  if(pdfFile){
    if(pdfFile.type!=="application/pdf" && !pdfFile.name.toLowerCase().endsWith(".pdf")){toast("Разрешен только PDF");return;}
    if(pdfFile.size>10*1024*1024){toast("PDF договора должен быть до 10 МБ");return;}
    obj.contractPdfBase64=await fileToBase64(pdfFile);
    obj.contractPdfFileName=pdfFile.name;
    obj.contractPdfMimeType=pdfFile.type || "application/pdf";
  }
  try{
    showLoader(true);
    if(CONFIG.API_URL) await api("saveMerchant",{merchant:obj});
    else {
      if(id){const i=state.merchants.findIndex(x=>x.id===id);state.merchants[i]={...state.merchants[i],...obj};}
      else state.merchants.push({...obj,id:"M"+Date.now()});
    }
    closeModal(); await loadData(); toast(t("saved"));
  }catch(e){toast(e.message)}finally{showLoader(false)}
}
function uniqueManagers(){
  const names = state.merchants.map(x=>String(x.manager||"").trim()).filter(isRealManager);
  return [...new Set(names)].sort();
}
function merchantSelect(selectedId=""){
  const opts = state.merchants.map(m=>`<option value="${esc(m.id)}" ${m.id===selectedId?'selected':''}>${esc(m.merchant)}${m.inn?' · '+esc(m.inn):''}</option>`).join("");
  return `<div class="field"><label>${t("merchant")}</label><select name="merchantId" onchange="syncMerchantFromSelect(this)"><option value="">${t("selectMerchant")}</option>${opts}</select></div>`;
}
function managerSelect(selected=""){
  const managers = ["Все",...uniqueManagers()];
  return `<div class="field"><label>${t("taskFor")}</label><select name="assignee">${managers.map(x=>`<option ${x===selected?'selected':''}>${esc(tr(x))}</option>`).join("")}</select></div>`;
}
function syncMerchantFromSelect(sel){
  const m=state.merchants.find(x=>x.id===sel.value)||{};
  const hidden=qs('#modalCard [name="merchant"]');
  if(hidden) hidden.value=m.merchant||"";
  const assignee=qs('#modalCard [name="assignee"]');
  if(assignee && m.manager && !assignee.value) assignee.value=m.manager;
}

async function saveTask(){
  const obj={};
  qs("#modalCard").querySelectorAll("[name]").forEach(el=>obj[el.name]=el.value);
  const mm = state.merchants.find(x=>x.id===obj.merchantId);
  if(mm) obj.merchant = mm.merchant;
  try{
    showLoader(true);
    if(CONFIG.API_URL) await api("saveTask",{task:obj});
    else state.tasks.push({...obj,id:"T"+Date.now()});
    closeModal(); await loadData(); toast(t("taskSaved"));
  }catch(e){toast(e.message)}finally{showLoader(false)}
}
function reportRows(obj){
  return Object.entries(obj).filter(([,v])=>Number(v)>0).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<tr><td>${esc(k)}</td><td>${v}</td></tr>`).join("") || `<tr><td colspan="2">${t("noData")}</td></tr>`;
}

const CRM_USERS_DEFAULT = [
  {login:"ceo@smartpay.tj", password:"1234", fio:"CEO SmartPay", position:"Руководитель", phone:""},
  {login:"umed@smartpay.tj", password:"1234", fio:"Умед", position:"Руководитель eCommerce", phone:""},
  {login:"azam@smartpay.tj", password:"1234", fio:"Азам", position:"Директор SmartPay", phone:""},
  {login:"jahongir@smartpay.tj", password:"1234", fio:"Джахонгир", position:"Менеджер SmartPay", phone:""},
  {login:"manizha@smartpay.tj", password:"1234", fio:"Манижа", position:"Менеджер SmartPay", phone:""}
];
const LOGIN_MIGRATION = {
  "umed@smartpay.com":"umed@smartpay.tj",
  "azam@smartpay.com":"azam@smartpay.tj",
  "jahongir@smartpay.com":"jahongir@smartpay.tj",
  "manizha@smartpay.com":"manizha@smartpay.tj"
};
function normalizeLogin(login){
  const raw = String(login || '').trim();
  const key = raw.toLowerCase();
  return LOGIN_MIGRATION[key] || raw;
}
function getUsers(){
  const defaults = CRM_USERS_DEFAULT.map(u=>({...u, login:String(u.login||'').trim()}));
  let saved=[];
  try{ const raw=JSON.parse(localStorage.getItem('sp_users')||'[]'); if(Array.isArray(raw)) saved=raw; }catch(e){ saved=[]; }
  const byLogin={};
  defaults.forEach(u=>byLogin[String(u.login).toLowerCase()]={...u});
  saved.forEach(u=>{
    u.login = normalizeLogin(u.login);
    const key=String(u.login||'').trim().toLowerCase();
    if(!key) return;
    byLogin[key]={...(byLogin[key]||{}), ...u, login:(byLogin[key]?.login || u.login)};
    if(!byLogin[key].password) byLogin[key].password='1234';
  });
  const users=Object.values(byLogin);
  localStorage.setItem('sp_users', JSON.stringify(users));
  return users;
}
function setUsers(u){localStorage.setItem('sp_users',JSON.stringify(u));}
function currentUser(){
  if(state.currentUser) return state.currentUser;
  try{state.currentUser=JSON.parse(localStorage.getItem('sp_current_user')||'null')}catch(e){state.currentUser=null}
  if(state.currentUser && state.currentUser.login){
    const fixedLogin = normalizeLogin(state.currentUser.login);
    if(fixedLogin !== state.currentUser.login){
      state.currentUser.login = fixedLogin;
      localStorage.setItem('sp_current_user', JSON.stringify(state.currentUser));
    }
  }
  return state.currentUser;
}
function requireLogin(){
  const u=currentUser();
  const el=qs('#loginScreen');
  if(el) el.classList.toggle('show', !u);
  renderProfileTop();
  return !!u;
}
function doLogin(){
  const login=normalizeLogin((qs('#loginEmail')?.value||'').trim());
  const pass=(qs('#loginPassword')?.value||'').trim();
  const user=getUsers().find(u=>String(u.login).toLowerCase()===login.toLowerCase() && String(u.password)===pass);
  if(!user){const er=qs('#loginError'); if(er) er.classList.add('show'); toast('Неверный логин или пароль'); return;}
  const er=qs('#loginError'); if(er) er.classList.remove('show');
  state.currentUser={login:user.login,fio:user.fio,position:user.position,phone:user.phone};
  localStorage.setItem('sp_current_user',JSON.stringify(state.currentUser));
  qs('#loginScreen').classList.remove('show');
  renderProfileTop();
  loadData();
}
function logout(){localStorage.removeItem('sp_current_user');state.currentUser=null;closeModal();requireLogin();}
function renderProfileTop(){
  const u=currentUser();
  const el=qs('#profileNameTop');
  const role=qs('#profileRoleTop');
  const av=qs('#profileAvatarTop');
  if(el) el.textContent=u?(u.fio||u.login):'Профиль';
  if(role) role.textContent=u?(u.position||u.login):'SmartPay CRM';
  if(av) av.textContent=u?getInitials(u.fio||u.login):'SP';
}
function openProfileModal(){
  const u=currentUser(); if(!u){requireLogin(); return;}
  showModal(`<h3>Профиль пользователя</h3>
    <div class="grid2">
      <div class="field"><label>ФИО</label><input name="profileFio" value="${esc(u.fio||'')}" placeholder="ФИО пользователя"></div>
      <div class="field"><label>Должность</label><input name="profilePosition" value="${esc(u.position||'')}" placeholder="Должность"></div>
      <div class="field"><label>Номер телефона</label><input name="profilePhone" value="${esc(u.phone||'')}" placeholder="+992 ..."></div>
      <div class="field"><label>Логин</label><input value="${esc(u.login||'')}" disabled></div>
      <div class="field"><label>Новый пароль</label><input type="password" name="newPassword" placeholder="Не заполняйте, если не меняете"></div>
      <div class="field"><label>Повторите пароль</label><input type="password" name="newPassword2" placeholder="Повторите пароль"></div>
    </div>
    <div class="modal-actions"><button class="btn danger" onclick="logout()">Выйти</button><button class="btn ghost" onclick="closeModal()">Закрыть</button><button class="btn primary" onclick="saveProfile()">Сохранить профиль</button></div>`);
}
function saveProfile(){
  const u=currentUser(); if(!u)return;
  const fio=qs('#modalCard [name="profileFio"]').value.trim();
  const position=qs('#modalCard [name="profilePosition"]').value.trim();
  const phone=qs('#modalCard [name="profilePhone"]').value.trim();
  const p=qs('#modalCard [name="newPassword"]').value.trim();
  const p2=qs('#modalCard [name="newPassword2"]').value.trim();
  if(!fio){toast('Заполните ФИО');return;}
  if(!position){toast('Заполните должность');return;}
  if(p && p!==p2){toast('Пароли не совпадают');return;}
  const users=getUsers();
  const item=users.find(x=>String(x.login).toLowerCase()===String(u.login).toLowerCase());
  if(item){ item.fio=fio; item.position=position; item.phone=phone; if(p)item.password=p; }
  setUsers(users);
  state.currentUser={login:u.login,fio,position,phone};
  localStorage.setItem('sp_current_user',JSON.stringify(state.currentUser));
  renderProfileTop();
  closeModal();
  setTimeout(()=>{
    successNotice(p ? '✅ Профиль и пароль успешно сохранены' : '✅ Профиль успешно сохранён');
  }, 180);
}
function changePassword(){
  saveProfile();
}
function taskIsClosed(x){
  const s=String((x&&x.status)||'').trim().toLowerCase();
  return s.includes('закры')||s.includes('выполн')||s.includes('closed')||s.includes('пӯшида');
}
function taskRowClass(x){
  const p=String((x&&x.priority)||'').toLowerCase();
  let c=taskIsClosed(x)?'task-closed ':'';
  if(p.includes('выс')||p.includes('баланд')) c+='task-high';
  else if(p.includes('сред')||p.includes('миёна')) c+='task-mid';
  return c;
}
function normalizeTaskStatus(s){
  const v=String(s||'').trim();
  if(!v) return 'Открыта';
  const low=v.toLowerCase();
  if(low.includes('закры')||low.includes('выполн')||low.includes('closed')) return 'Закрыта';
  return v;
}
function renderTasks(){
  if(!state.taskTab) state.taskTab='active';
  const active=(state.tasks||[]).filter(x=>!taskIsClosed(x));
  const archive=(state.tasks||[]).filter(taskIsClosed);
  let list=state.taskTab==='archive'?archive:active;
  if(state.filterText==='overdue') list=list.filter(x=>isOverdue(x.dueDate));
  qs('#viewRoot').innerHTML=`<section class="panel"><div class="panel-head"><h3>${t('tasks')}</h3><div class="actions"><button class="btn primary" onclick="openTaskModal()">${t('addTask')}</button></div></div>
    <div class="tabs nice-tabs"><button class="tab-btn ${state.taskTab==='active'?'active':''}" onclick="state.taskTab='active';renderTasks()">✅ ${state.lang==='tj'?'Вазифаҳои фаъол':'Активные задачи'} (${active.length})</button><button class="tab-btn ${state.taskTab==='archive'?'active':''}" onclick="state.taskTab='archive';renderTasks()">📦 ${state.lang==='tj'?'Бойгонии вазифаҳо':'Архив задач'} (${archive.length})</button></div>${taskTable(list)}</section>`;
}
function taskTable(list){
  if(!list || !list.length) return `<div class="empty">${t('noData')}</div>`;
  return `<div class="table-wrap"><table><thead><tr><th>${t('merchant')}</th><th>${t('taskTitle')}</th><th>${t('taskFor')}</th><th>${t('priority')}</th><th>${t('dueDate')}</th><th>${t('status')}</th><th>${t('description')}</th><th>${t('comments')}</th></tr></thead><tbody>${list.map((x,i)=>{
    const id=String(x.id||'').trim();
    return `<tr class="task-row ${taskRowClass(x)}" data-task-id="${esc(id)}" title="Открыть карточку задачи">
      <td>${esc(x.merchant||'')}</td><td><b>${esc(tr(x.title||''))}</b></td><td>${esc(tr(x.assignee||''))}</td><td class="${priorityClass(x.priority)}">${esc(tr(x.priority||''))}</td><td>${fmtDate(x.dueDate)} ${isOverdue(x.dueDate)&&!taskIsClosed(x)?'⚠️':''}</td><td>${esc(tr(x.status||''))}</td><td>${esc(tr(x.description||''))}</td><td class="task-comment">${esc(tr(x.comment||x.comments||''))}</td>
    </tr>`;
  }).join('')}</tbody></table></div>`;
}
function openTaskViewModal(id){
  const x=(state.tasks||[]).find(t=>String(t.id||'')===String(id||''));
  if(!x || !String(x.id||'').trim()) { toast('У этой задачи нет ID. Нажмите Обновить, чтобы система добавила ID.'); return; }
  const comments=String(x.comment||x.comments||'').trim();
  showModal(`<h3>${state.lang==='tj'?'Корти вазифа':'Карточка задачи'}</h3><div class="task-info-grid">
    ${infoTile(t('merchant'),x.merchant||'')}${infoTile(t('taskTitle'),tr(x.title||''))}${infoTile(t('taskFor'),tr(x.assignee||''))}${infoTile(t('priority'),tr(x.priority||''))}${infoTile(t('dueDate'),fmtDate(x.dueDate))}${infoTile(t('status'),tr(x.status||''))}</div>
    <div class="profile-block" style="margin-top:12px"><span>${t('description')}</span><p>${esc(tr(x.description||''))}</p></div>
    <div class="field" style="margin-top:14px"><label>${t('comments')}</label><textarea name="taskComment" placeholder="${state.lang==='tj'?'Шарҳ илова кунед':'Добавьте комментарий'}">${esc(comments)}</textarea></div>
    <div class="field"><label>${state.lang==='tj'?'Муҳлати нав':'Новый дедлайн'}</label><input type="date" name="taskDueDate" value="${esc(dateToInput(x.dueDate))}"></div>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">${state.lang==='tj'?'Пӯшидан':'Закрыть'}</button><button class="btn" onclick="saveTaskFromView('${esc(x.id)}',false)">${t('save')}</button><button class="btn primary" onclick="saveTaskFromView('${esc(x.id)}',true)">${state.lang==='tj'?'Иҷро шуд':'Выполнено'}</button></div>`);
}
function dateToInput(v){
  const s=String(v||'').trim();
  let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/); if(m) return `${m[1]}-${m[2]}-${m[3]}`;
  m=s.match(/^(\d{2})[.\/\-](\d{2})[.\/\-](\d{4})/); if(m) return `${m[3]}-${m[2]}-${m[1]}`;
  return '';
}
async function saveTaskFromView(id,done){
  const old=(state.tasks||[]).find(t=>String(t.id||'')===String(id||''));
  if(!old){ toast('Задача не найдена'); return; }
  const comment=qs('#modalCard [name="taskComment"]')?.value || '';
  const dueDate=qs('#modalCard [name="taskDueDate"]')?.value || old.dueDate || '';
  const obj={
    id: old.id,
    merchantId: old.merchantId || '',
    merchant: old.merchant || '',
    title: old.title || '',
    assignee: old.assignee || '',
    priority: old.priority || '',
    dueDate,
    status: done ? 'Закрыта' : normalizeTaskStatus(old.status || 'Открыта'),
    description: old.description || '',
    createdAt: old.createdAt || '',
    comment,
    user:(currentUser()?.fio||currentUser()?.login||'Пользователь')
  };
  try{
    showLoader(true);
    // оптимистично обновляем интерфейс, чтобы даже при медленном API программа не «слетала»
    Object.assign(old,obj);
    if(CONFIG.API_URL) await api('saveTask',{task:obj});
    closeModal();
    renderTasks(); updateTaskBadge();
    await loadData();
    toast(done?'Задача выполнена':'Задача обновлена');
  }catch(e){
    console.error(e); toast('Ошибка сохранения задачи: '+(e.message||e)); renderTasks();
  }finally{showLoader(false)}
}
saveTask=async function(){
  const card=qs('#modalCard');
  const obj={}; card.querySelectorAll('[name]').forEach(el=>obj[el.name]=el.value);
  const mm=(state.merchants||[]).find(x=>String(x.id)===String(obj.merchantId));
  if(mm) obj.merchant=mm.merchant;
  obj.status=normalizeTaskStatus(obj.status||'Открыта');
  obj.user=(currentUser()?.fio||currentUser()?.login||'Пользователь');
  try{
    showLoader(true);
    if(CONFIG.API_URL) await api('saveTask',{task:obj});
    else state.tasks.push({...obj,id:'T'+Date.now()});
    closeModal(); await loadData(); toast(t('taskSaved'));
  }catch(e){console.error(e); toast('Ошибка создания задачи: '+(e.message||e));}
  finally{showLoader(false)}
}
updateTaskBadge=function(){
  const badge=qs('#tasksBadge'); if(!badge)return;
  const open=(state.tasks||[]).filter(x=>!taskIsClosed(x)).length;
  const overdue=(state.tasks||[]).filter(x=>!taskIsClosed(x)&&isOverdue(x.dueDate)).length;
  const n=overdue||open; badge.textContent=String(n); badge.style.display=n?'inline-grid':'none'; badge.classList.toggle('warn', !overdue && open>0);
}

}

// === PWA auto-update: при открытии приложения проверяет новую версию и обновляет интерфейс ===
(function initPWAAutoUpdate(){
  if(!('serviceWorker' in navigator)) return;
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(refreshing) return;
    refreshing = true;
    window.location.reload();
  });
  window.addEventListener('load',async()=>{
    try{
      const reg = await navigator.serviceWorker.register('./sw.js');
      await reg.update();
      if(reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});
      reg.addEventListener('updatefound',()=>{
        const nw = reg.installing;
        if(!nw) return;
        nw.addEventListener('statechange',()=>{
          if(nw.state === 'installed' && navigator.serviceWorker.controller){
            nw.postMessage({type:'SKIP_WAITING'});
          }
        });
      });
    }catch(e){ console.warn('PWA registration failed', e); }
  });
})();
