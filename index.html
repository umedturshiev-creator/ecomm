function tr(v){
  const s=String(v??"").trim();
  if(state.lang!=="tj" || !s) return s;
  if(TJ_EXACT[s]) return TJ_EXACT[s];
  let out=s;
  Object.keys(TJ_WORDS).sort((a,b)=>b.length-a.length).forEach(k=>{out=out.replaceAll(k,TJ_WORDS[k]);});
  return out;
}
function qs(s){return document.querySelector(s)}
function qsa(s){return [...document.querySelectorAll(s)]}
function showLoader(v){qs("#loader").classList.toggle("show",!!v)}
function toast(msg){const el=qs("#toast");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2600)}
function esc(v){return String(v??"").replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[s]))}
function todayISO(){return new Date().toISOString().slice(0,10)}
function fmtDate(v){
  if(!v) return "";
  const s=String(v).trim();
  // Без new Date(): дата должна показываться ровно так, как указана в Google Sheets.
  let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return `${m[3]}.${m[2]}.${m[1]}`;
  m=s.match(/^(\d{1,2})[.\/](\d{1,2})[.\/](\d{4})/);
  if(m) return `${m[1].padStart(2,"0")}.${m[2].padStart(2,"0")}.${m[3]}`;
  m=s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})/);
  if(m) return `${m[1].padStart(2,"0")}.${m[2].padStart(2,"0")}.${m[3]}`;
  return s.replace(/\sGMT.*$/," ").replace(/T.*$/," ").trim();
}
function statusClass(s){
  s=String(s||"").toLowerCase();
  if(s.includes("актив")||s.includes("фаъол"))return"active";
  if(s.includes("проблем")||s.includes("мушкил"))return"problem";
  if(s.includes("ожид")||s.includes("интеграц")||s.includes("тест")||s.includes("нет ответа")||s.includes("ҷавоб"))return"wait";
  if(s.includes("отказ")||s.includes("заморож"))return"off";
  return"work";
}
function priorityClass(s){
  s=String(s||"").toLowerCase();
  if(s.includes("выс")||s.includes("баланд"))return"priority-high";
  if(s.includes("низ")||s.includes("паст"))return"priority-low";
  if(!s)return"";
  return"priority-mid";
}
function rowPriorityClass(s){
  s=String(s||"").toLowerCase();
  if(s.includes("выс")||s.includes("баланд")) return "row-high";
  if(s.includes("сред")||s.includes("миёна")) return "row-mid";
  return "";
}
function isOverdue(d){return d && String(d).slice(0,10)<todayISO()}
function dateInputValue(v){
  if(!v) return "";
  const s=String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  const m=s.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{4})/);
  if(m) return `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
  return s;
}

async function api(action,payload={}){
  if(!CONFIG.API_URL){
    if(CONFIG.DEMO_IF_NO_API) return demo;
    throw new Error("API_URL пустой");
  }
  const res = await fetch(CONFIG.API_URL, {
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify({action,...payload})
  });
  const data = await res.json();
  if(!data.ok) throw new Error(data.message || "Ошибка API");
  return data;
}

async function loadData(){
  try{
    showLoader(true);
    const data = await api("getData");
    state.merchants = data.merchants || demo.merchants;
    state.tasks = data.tasks || demo.tasks;
    state.history = data.history || demo.history;
    render();
  }catch(e){
    console.error(e);
    toast(t("loadingDemo"));
    state.merchants=demo.merchants;state.tasks=demo.tasks;state.history=demo.history;render();
  }finally{showLoader(false)}
}

function setView(view, opts={}){
  state.view=view; state.filterStatus=opts.status||""; state.filterText=opts.text||""; state.contractFilter=opts.contract||""; state.filterBusinessType=opts.businessType||"";
  qsa(".nav button").forEach(b=>b.classList.toggle("active",b.dataset.view===view));
  render();
}

function applyLang(){
  document.documentElement.lang=state.lang;
  qs("#langSelect").value=state.lang;
  qsa("[data-i18n]").forEach(el=>el.textContent=t(el.dataset.i18n));
  qs("#brandSub").textContent = (state.lang==="tj"?"Роҳбарият":"Руководство");
}

  applyLang();
  const titles={dashboard:t("pageDashboard"),merchants:t("merchants"),tasks:t("tasks"),problems:t("problems"),analytics:t("analytics"),history:t("history")};
  qs("#pageTitle").textContent=titles[state.view]||t("pageDashboard");
  qs("#pageSub").textContent=t("pageSub");
  if(state.view==="dashboard") renderDashboard();

  if(state.view==="problems") {state.filterStatus="Проблемный"; renderMerchants(true);}

}

function counts(){
  const m=state.merchants;
  return {
    total:m.length,
    active:m.filter(x=>String(x.status).toLowerCase().includes("актив")||String(x.status).toLowerCase().includes("фаъол")).length,
    work:m.filter(x=>["в работе","в процессе","интеграц","тест","ожида"].some(s=>String(x.status).toLowerCase().includes(s))).length,
    problem:m.filter(x=>String(x.status).toLowerCase().includes("проблем")).length,
    integration:m.filter(x=>String(x.status||"").toLowerCase().includes("интеграц")||String(x.status||"").toLowerCase().includes("тест")).length,
    overdue:state.tasks.filter(x=>String(x.status).toLowerCase()!=="закрыта" && isOverdue(x.dueDate)).length
  };
}

    <select onchange="state.filterStatus=this.value;renderMerchants()">${statuses.map(s=>`<option value="${esc(s)}" ${s===state.filterStatus?'selected':''}>${s?tr(s):t('allStatuses')}</option>`).join("")}</select>
    <select onchange="state.filterBusinessType=this.value;renderMerchants()"><option value="">${t("allBusinessTypes")}</option>${uniqueBusinessTypes().map(bt=>`<option value="${esc(bt)}" ${bt===state.filterBusinessType?'selected':''}>${esc(tr(bt))}</option>`).join("")}</select>
  </div>`;

function getFilteredMerchants(){
  const text=String(state.filterText||"").toLowerCase();
  return state.merchants.filter(m=>{
    const byStatus=!state.filterStatus || String(m.status||"").toLowerCase().includes(state.filterStatus.toLowerCase());
    const hasContract=!!(m.contractNumber||m.contractDate);
    const byContract=!state.contractFilter || (state.contractFilter==="with"?hasContract:!hasContract);
    const byBusiness=!state.filterBusinessType || String(m.businessType||"")===state.filterBusinessType;
    const hay=[m.merchant,m.inn,m.city,m.businessType,m.manager,m.product,m.comment,m.contractNumber,m.contractDate,m.phone,m.contactName].join(" ").toLowerCase();
    return byStatus && byContract && byBusiness && (!text || hay.includes(text));
  });
}

  return `<div class="contract"><b>${num?`№ ${esc(num)}`:"№ —"}</b><small>${date||t("contractNo")}</small></div>`;
}
function contactCell(m){
  const phone=String(m.phone||"").trim();

  return `<div class="contract"><b>${phone?esc(phone):"—"}</b><small>${name?esc(tr(name)):t("notSpecified")}</small></div>`;

function money(n){return new Intl.NumberFormat('ru-RU',{maximumFractionDigits:0}).format(n||0)}
function uniqueValues(key){return [...new Set(state.merchants.map(x=>String(x[key]||"").trim()).filter(Boolean))]}
function countByProductWords(){
  const out={};
  state.merchants.forEach(m=>{
    const p=String(m.product||"Не указано");
    const parts=p.split(/[,;/]+/).map(x=>x.trim()).filter(Boolean);
    (parts.length?parts:[p]).forEach(x=>out[x]=(out[x]||0)+1);
  });
  return out;
}
function countBy(arr,key){return arr.reduce((a,x)=>{const k=(x[key]||"Не указано").toString();a[k]=(a[k]||0)+1;return a},{})}
function countByTranslated(arr,key){return arr.reduce((a,x)=>{const k=tr((x[key]||"Не указано").toString());a[k]=(a[k]||0)+1;return a},{})}
function isRealManager(name){
  const s=String(name||"").trim().toLowerCase();
  return !!s && !["не назначен","без менеджера","не указано","все","команда","-","—","таъин нашудааст","бе менеҷер","нишон дода нашудааст","ҳама"].includes(s);
}
function countByManagers(arr){return arr.reduce((a,x)=>{const raw=String(x.manager||"").trim(); if(!isRealManager(raw)) return a; const k=tr(raw); a[k]=(a[k]||0)+1; return a;},{})}
function chartKey(title){return String(title).replace(/[^a-zA-Zа-яА-Я0-9]+/g,"_")}
function toggleChart(key){state.expandedCharts[key]=!state.expandedCharts[key];render()}
function chartPanel(title,obj,trunc=false,mini=false){
  const key=chartKey(title);
  const expanded=!!state.expandedCharts[key];
  const entries=Object.entries(obj)
    .filter(([,v])=>Number(v)>0)
    .sort((a,b)=>b[1]-a[1]);
  const max=Math.max(1,...entries.map(([,v])=>Number(v)));
  const total=entries.reduce((a,[,v])=>a+Number(v),0);
  const visible=(mini && !expanded)?entries.slice(0,6):entries;
  if(!visible.length){
    return `<section class="panel"><div class="panel-head"><h3>${title}</h3></div><div class="empty">${t("noData")}</div></section>`;
  }
  const rows=visible.map(([k,v])=>{
    const value=Number(v);
    const pct=total?Math.round(value/total*100):0;
    const label=String(k||t("notSpecified"));
    const shortLabel=trunc && label.length>22 ? label.slice(0,22)+"..." : label;
    return `<div class="bar">
      <div class="bar-top"><span class="bar-label" title="${esc(label)}">${esc(shortLabel)}</span><span class="bar-value">${value} · ${pct}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.max(3,value/max*100)}%"></div></div>
    </div>`;
  }).join("");
  const more=entries.length>6 ? `<div class="chart-note"><button onclick="toggleChart('${esc(key)}')">${expanded?t("hide"):`+ ${entries.length-6} ${t("moreItems")} · ${t("showAll")}`}</button></div>` : "";
  return `<section class="panel chart-panel"><div class="panel-head"><h3>${title}</h3></div><div class="chart-summary"><div><b>${total}</b><br><span>${t("totalRecords")}</span></div><span>${t("barChartHint")}</span></div><div class="chart-list">${rows}</div>${more}</section>`;
}
function renderHistory(){
  const list=state.history||[];
  qs("#viewRoot").innerHTML=`<section class="panel"><div class="panel-head"><h3>${t("history")}</h3></div>${!list.length?`<div class="empty">${t("noData")}</div>`:`<div class="table-wrap"><table><thead><tr><th>${t("date")}</th><th>${t("user")}</th><th>${t("action")}</th><th>${t("object")}</th><th>${t("details")}</th></tr></thead><tbody>${list.map(x=>`<tr><td>${esc(x.date)}</td><td>${esc(x.user)}</td><td>${esc(tr(x.action))}</td><td>${esc(tr(x.object))}</td><td>${esc(tr(x.details))}</td></tr>`).join("")}</tbody></table></div>`}</section>`;
}

function openTextModal(title,text,label="product"){
  const lab = label==="comment" ? t("commentText") : t("productText");
  showModal(`<h3>${esc(title)}</h3><div class="field"><label>${lab}</label><textarea readonly>${esc(text)}</textarea></div><div class="modal-actions"><button class="btn primary" onclick="closeModal()">${t("ok")}</button></div>`);
}
function openMerchantViewModal(id=""){
  const m=state.merchants.find(x=>x.id===id);
  if(!m) return;
  showModal(`<h3>${t("merchantCard")}: ${esc(m.merchant||"")}</h3>
    <div class="grid2">
      ${readonlyInfo(t("inn"),m.inn)}
      ${readonlyInfo(t("city"),tr(m.city||""))}
      ${readonlyInfo(t("businessType"),tr(m.businessType||""))}
      ${readonlyInfo(t("manager"),tr(m.manager||""))}
      ${readonlyInfo(t("phone"),m.phone)}
      ${readonlyInfo(t("contactName"),tr(m.contactName||""))}
      ${readonlyInfo(t("status"),tr(m.status||""))}
      ${readonlyInfo(t("priority"),tr(m.priority||""))}
      ${readonlyInfo(t("contract"),`${m.contractNumber?"№ "+m.contractNumber:"—"} ${fmtDate(m.contractDate)||""}`)}
      ${readonlyInfo(t("revenue"),m.revenue)}
      ${readonlyInfo(t("invoices"),m.invoices)}
    </div>
    ${readonlyBlock(t("product"),tr(m.product||""))}
    ${readonlyBlock(t("comments"),tr(m.comment||""))}
    <div class="modal-actions"><button class="btn ghost" onclick="openMerchantModal('${esc(id)}')">${t("edit")}</button><button class="btn primary" onclick="closeModal()">${t("ok")}</button></div>`);
}
function readonlyInfo(label,value){return `<div class="field"><label>${esc(label)}</label><input readonly value="${esc(value||"")}"></div>`}
function readonlyBlock(label,value){return `<div class="field"><label>${esc(label)}</label><textarea readonly>${esc(value||"")}</textarea></div>`}

const CITY_OPTIONS=["Душанбе","Худжанд","Бохтар","Куляб","Истаравшан","Турсунзаде","Канибадам","Исфара","Пенджикент","Вахдат","Гиссар","Нурек","Рогун","Левакант","Хорог","Дангара","Фархор","Восе","Яван","Рудаки","Айни","Ашт","Спитамен","Джаббор Расулов","Бободжон Гафуров","Шахринав","Рашт","Мургаб"];
const DEFAULT_BUSINESS_TYPES=["Торговля","Услуги","Ресторан","Кафе","Одежда","Маркетплейс","Аптека","Супермаркет","Образование","Медицина","Доставка","Такси","Туризм","Гостиница","Строительство","Красота","Автосервис","Государственные услуги","Коммунальные услуги","Развлечения"];
const MERCHANT_STATUSES=["В процессе","В работе","Ожидает документы","На интеграции и тест","Активный","Проблемный","Заморожен","Нет ответа"];
const PRIORITIES=["","Низкий","Средний","Высокий"];
function uniqueBusinessTypes(){return [...new Set([...DEFAULT_BUSINESS_TYPES,...state.merchants.map(x=>String(x.businessType||"").trim()).filter(Boolean)])].sort()}
function comboField(name,label,value="",options=[]){const listId=`list_${name}_${Date.now()}`;return `<div class="field"><label>${esc(label)}<span class="req">*</span></label><input name="${name}" list="${listId}" value="${esc(value)}" data-required="1"><datalist id="${listId}">${options.map(o=>`<option value="${esc(o)}"></option>`).join("")}</datalist><div class="field-error">${t("requiredError")}</div><small style="display:block;color:var(--muted);margin-top:6px">${t("customAllowed")}</small></div>`}
function requiredField(name,label,value="",type="text"){return `<div class="field"><label>${esc(label)}<span class="req">*</span></label><input name="${name}" type="${type}" value="${esc(value)}" data-required="1"><div class="field-error">${t("requiredError")}</div></div>`}
function requiredTextarea(name,label,value=""){return `<div class="field"><label>${esc(label)}<span class="req">*</span></label><textarea name="${name}" data-required="1">${esc(value)}</textarea><div class="field-error">${t("requiredError")}</div></div>`}
function requiredSelectField(name,label,value,options){return `<div class="field"><label>${esc(label)}<span class="req">*</span></label><select name="${name}" data-required="1">${options.map(o=>`<option value="${esc(o)}" ${o===value?'selected':''}>${esc(tr(o))}</option>`).join("")}</select><div class="field-error">${t("requiredError")}</div></div>`}
function optionalSelectField(name,label,value,options){return `<div class="field"><label>${esc(label)}</label><select name="${name}">${options.map(o=>`<option value="${esc(o)}" ${o===value?'selected':''}>${o?esc(tr(o)):''}</option>`).join("")}</select></div>`}
function managerMerchantSelect(selected=""){const managers=uniqueManagers();return `<div class="field"><label>${t("manager")}<span class="req">*</span></label><select name="manager" data-required="1"><option value="">${t("selectMerchant").replace(t("merchant"),t("manager"))}</option>${managers.map(x=>`<option value="${esc(x)}" ${x===selected?'selected':''}>${esc(tr(x))}</option>`).join("")}</select><div class="field-error">${t("requiredError")}</div></div>`}

function openMerchantModal(id=""){
  const m=state.merchants.find(x=>x.id===id)||{};
  showModal(`<h3>${id?t("edit"):t("addMerchant")}</h3>
  <div class="grid2">
    ${requiredField("merchant",t("merchant"),m.merchant)}
    ${requiredField("inn",t("inn"),m.inn)}
    ${comboField("city",t("city"),m.city,CITY_OPTIONS)}
    ${comboField("businessType",t("businessType"),m.businessType,uniqueBusinessTypes())}
    ${requiredField("contactName",t("contactName"),m.contactName)}
    ${requiredField("phone",t("phone"),m.phone)}
    ${managerMerchantSelect(m.manager||"")}
    ${requiredSelectField("status",t("status"),m.status||"В процессе",MERCHANT_STATUSES)}
    ${optionalSelectField("priority",t("priority"),m.priority||"",PRIORITIES)}
    ${requiredField("contractNumber",t("contractNumber"),m.contractNumber)}
    ${requiredField("contractDate",t("contractDate"),dateInputValue(m.contractDate),"date")}
    ${field("revenue",t("revenue"),m.revenue,"number")}
    ${field("invoices",t("invoices"),m.invoices,"number")}
  </div>
  ${requiredTextarea("product",t("product"),m.product)}
  ${textareaField("comment",t("comments"),m.comment)}
  <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">${t("cancel")}</button><button class="btn primary" onclick="saveMerchant('${esc(id)}')">${t("save")}</button></div>`);
}
function field(name,label,value="",type="text"){return `<div class="field"><label>${esc(label)}</label><input name="${name}" type="${type}" value="${esc(value)}"></div>`}
function textareaField(name,label,value=""){return `<div class="field"><label>${esc(label)}</label><textarea name="${name}">${esc(value)}</textarea></div>`}
function selectField(name,label,value,options){return `<div class="field"><label>${esc(label)}</label><select name="${name}">${options.map(o=>`<option ${o===value?'selected':''}>${esc(o)}</option>`).join("")}</select></div>`}

async function saveMerchant(id){
  const card=qs("#modalCard");
  let valid=true;
  card.querySelectorAll("[data-required='1']").forEach(el=>{
    const empty=!String(el.value||"").trim();
    el.classList.toggle("invalid", empty);
    if(empty) valid=false;
  });
  if(!valid){ toast(t("requiredError")); return; }
  const obj={id};
  card.querySelectorAll("[name]").forEach(el=>obj[el.name]=el.value);
  try{
    showLoader(true);
    if(CONFIG.API_URL) await api("saveMerchant",{merchant:obj});
    else {
      if(id){const i=state.merchants.findIndex(x=>x.id===id);state.merchants[i]={...state.merchants[i],...obj};}
      else state.merchants.push({...obj,id:"M"+Date.now()});
    }
    closeModal(); await loadData(); toast(t("saved"));
  }catch(e){toast(e.message)}finally{showLoader(false)}
}
function uniqueManagers(){
  const names = state.merchants.map(x=>String(x.manager||"").trim()).filter(isRealManager);
  return [...new Set(names)].sort();
}
function merchantSelect(selectedId=""){
  const opts = state.merchants.map(m=>`<option value="${esc(m.id)}" ${m.id===selectedId?'selected':''}>${esc(m.merchant)}${m.inn?' · '+esc(m.inn):''}</option>`).join("");
  return `<div class="field"><label>${t("merchant")}</label><select name="merchantId" onchange="syncMerchantFromSelect(this)"><option value="">${t("selectMerchant")}</option>${opts}</select></div>`;
}
function managerSelect(selected=""){
  const managers = ["Все",...uniqueManagers()];
  return `<div class="field"><label>${t("taskFor")}</label><select name="assignee">${managers.map(x=>`<option ${x===selected?'selected':''}>${esc(tr(x))}</option>`).join("")}</select></div>`;
}
function syncMerchantFromSelect(sel){
  const m=state.merchants.find(x=>x.id===sel.value)||{};
  const hidden=qs('#modalCard [name="merchant"]');
  if(hidden) hidden.value=m.merchant||"";
  const assignee=qs('#modalCard [name="assignee"]');
  if(assignee && m.manager && !assignee.value) assignee.value=m.manager;
}
function openTaskModal(merchantId=""){
  const m=state.merchants.find(x=>x.id===merchantId)||{};
  showModal(`<h3>${t("newTask")}</h3>
    ${field("title",t("taskTitle"),"")}
    <input type="hidden" name="merchant" value="${esc(m.merchant||"")}">
    <div class="grid2">
      ${merchantSelect(m.id||"")}
      ${managerSelect(m.manager||"Все")}
      ${selectField("priority",t("priority"),"Средний",["Низкий","Средний","Высокий"])}
      ${field("dueDate",t("dueDate"),"","date")}
      ${selectField("status",t("status"),"Открыта",["Открыта","В работе","Закрыта"])}
    </div>
    ${textareaField("description",t("description"),"")}
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">${t("cancel")}</button><button class="btn primary" onclick="saveTask()">${t("save")}</button></div>`);
}
async function saveTask(){
  const obj={};
  qs("#modalCard").querySelectorAll("[name]").forEach(el=>obj[el.name]=el.value);
  const mm = state.merchants.find(x=>x.id===obj.merchantId);
  if(mm) obj.merchant = mm.merchant;
  try{
    showLoader(true);
    if(CONFIG.API_URL) await api("saveTask",{task:obj});
    else state.tasks.push({...obj,id:"T"+Date.now()});
    closeModal(); await loadData(); toast(t("taskSaved"));
  }catch(e){toast(e.message)}finally{showLoader(false)}
}
function showModal(html){qs("#modalCard").innerHTML=html;qs("#modal").classList.add("show")}
function closeModal(){qs("#modal").classList.remove("show");qs("#modalCard").innerHTML=""}
document.addEventListener("click",e=>{
  const textBtn=e.target.closest(".js-open-text");
  if(textBtn){ openTextModal(textBtn.dataset.title||"", textBtn.dataset.text||"", textBtn.dataset.label||"product"); return; }
  const viewBtn=e.target.closest(".js-view-merchant");
  if(viewBtn){ openMerchantViewModal(viewBtn.dataset.id||""); return; }
  const editBtn=e.target.closest(".js-edit-merchant");
  if(editBtn){ openMerchantModal(editBtn.dataset.id||""); return; }
  const taskBtn=e.target.closest(".js-new-task");
  if(taskBtn){ openTaskModal(taskBtn.dataset.id||""); return; }
});
qs("#modal").addEventListener("click",e=>{if(e.target.id==="modal")closeModal()});
qsa(".nav button").forEach(b=>b.addEventListener("click",()=>setView(b.dataset.view)));
qs("#langSelect").addEventListener("change",e=>{state.lang=e.target.value;localStorage.setItem("sp_lang",state.lang);render()});
loadData();
</script>
</body>
</html>
