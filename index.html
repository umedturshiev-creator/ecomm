<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartPay Merchant CRM</title>
  <meta name="theme-color" content="#246bfe"/>
  <style>
    :root{
      --bg:#f4f7fb;--card:#fff;--text:#172033;--muted:#758096;--line:#e8edf5;
      --blue:#246bfe;--blue2:#1d55d8;--green:#18a058;--orange:#f59e0b;--red:#ef4444;
      --dark:#0d1b36;--shadow:0 14px 35px rgba(21,32,56,.08);--radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(135deg,#eef4ff 0%,#f8fbff 45%,#f4f7fb 100%);font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--text)}
    button,input,select,textarea{font:inherit}
    .app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
    .sidebar{background:var(--dark);color:#fff;padding:24px 18px;position:sticky;top:0;height:100vh}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:28px}
    .logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#2e7bff,#22c55e);display:grid;place-items:center;font-weight:900}
    .brand h1{font-size:18px;margin:0;line-height:1.1}.brand span{display:block;color:#b8c4dc;font-size:12px;margin-top:4px}
    .nav{display:grid;gap:8px}.nav button{border:0;background:transparent;color:#dbe6ff;text-align:left;padding:12px 14px;border-radius:14px;font-size:14px;cursor:pointer}.nav button.active,.nav button:hover{background:rgba(255,255,255,.11);color:white}
    .main{padding:24px 28px}.top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px}.top h2{font-size:26px;margin:0}.top small{color:var(--muted)}
    .meta{display:flex;gap:10px;align-items:center;color:var(--muted);font-size:13px}.pill{background:white;border:1px solid var(--line);border-radius:999px;padding:8px 12px;box-shadow:0 6px 18px rgba(21,32,56,.04)}
    .lang{border:1px solid var(--line);background:white;border-radius:12px;padding:8px 10px}
    .cards{display:grid;grid-template-columns:repeat(5,minmax(140px,1fr));gap:14px;margin-bottom:22px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);cursor:pointer;transition:.18s}.card:hover{transform:translateY(-3px);border-color:#cfe0ff}.card .label{color:var(--muted);font-size:13px}.card .num{font-size:30px;font-weight:900;margin-top:8px}.card .hint{font-size:12px;color:var(--blue);margin-top:10px}
    .green{color:var(--green)}.orange{color:var(--orange)}.red{color:var(--red)}
    .panel{background:white;border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}.panel-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line);gap:12px;flex-wrap:wrap}.panel-head h3{margin:0;font-size:17px}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;border-radius:12px;background:#edf4ff;color:#1d55d8;padding:10px 13px;font-weight:800;cursor:pointer}.btn:hover{filter:brightness(.98)}.btn.primary{background:var(--blue);color:white}.btn.danger{background:#fff0f0;color:#c53030}.btn.ghost{background:#f3f6fb;color:#34415a}.btn.icon{width:38px;height:38px;padding:0;position:relative}.btn.icon:hover::after{content:attr(data-tip);position:absolute;right:0;bottom:44px;background:#111827;color:white;font-size:12px;white-space:nowrap;padding:8px 10px;border-radius:9px;font-weight:500;box-shadow:0 10px 25px rgba(0,0,0,.16);z-index:10}
    .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}.filters input,.filters select{border:1px solid var(--line);background:#fff;border-radius:13px;padding:11px 12px;min-width:170px}
    .empty{padding:34px;text-align:center;color:var(--muted)}
    table{width:100%;border-collapse:collapse;font-size:14px}th,td{padding:14px 16px;border-bottom:1px solid var(--line);vertical-align:middle}th{text-align:left;color:#687286;font-size:12px;text-transform:uppercase;letter-spacing:.04em;background:#fbfcff}tr:hover td{background:#fbfdff}
    .status{display:inline-flex;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900}.status.active{background:#e9f9f0;color:#0f7a3f}.status.work{background:#fff6df;color:#9a6300}.status.problem{background:#fff0f0;color:#c53030}.status.wait{background:#eef4ff;color:#1d55d8}.status.off{background:#f3f4f6;color:#4b5563}
    .priority-high{color:var(--red);font-weight:900}.priority-mid{color:var(--orange);font-weight:900}.priority-low{color:var(--green);font-weight:900}
    .truncate{max-width:210px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:inline-block;vertical-align:bottom;border-bottom:1px dashed #9fb4d8;cursor:pointer}.contract{display:flex;flex-direction:column;gap:3px;min-width:120px}.contract b{font-size:13px}.contract small{color:var(--muted);font-size:12px}.comment{max-width:260px;color:#38445a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .table-wrap{overflow:auto}.manager{font-weight:800}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.chart-list{display:grid;gap:10px;padding:16px 20px}.bar{display:grid;grid-template-columns:160px 1fr 50px;gap:10px;align-items:center}.bar-track{height:10px;background:#edf2fb;border-radius:99px;overflow:hidden}.bar-fill{height:100%;background:var(--blue);border-radius:99px}
    .modal{position:fixed;inset:0;background:rgba(9,18,35,.45);display:none;place-items:center;padding:20px;z-index:50}.modal.show{display:grid}.modal-card{width:min(720px,100%);max-height:92vh;overflow:auto;background:white;border-radius:24px;box-shadow:0 25px 70px rgba(0,0,0,.24);padding:22px}.modal-card h3{margin:0 0 16px}.field{margin-bottom:14px}.field label{display:block;color:#637086;font-size:13px;font-weight:900;margin-bottom:7px}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:13px;padding:12px;background:#fff}.field textarea{min-height:82px;resize:vertical}.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:10px;position:sticky;bottom:-22px;background:#fff;padding-top:12px}
    .toast{position:fixed;right:20px;bottom:20px;background:#111827;color:white;padding:12px 14px;border-radius:14px;box-shadow:0 12px 30px rgba(0,0,0,.18);display:none;z-index:80}.toast.show{display:block}
    .loader{position:fixed;inset:0;background:rgba(255,255,255,.65);display:none;place-items:center;z-index:60}.loader.show{display:grid}.spinner{width:44px;height:44px;border:4px solid #dbeafe;border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:1100px){.cards{grid-template-columns:repeat(2,1fr)}.grid2,.grid3{grid-template-columns:1fr}}
    @media(max-width:850px){.app{grid-template-columns:1fr}.sidebar{height:auto;position:relative}.main{padding:18px}.top{align-items:flex-start;flex-direction:column}.cards{grid-template-columns:1fr}table{min-width:1100px}.nav{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo">SP</div><div><h1>SmartPay CRM</h1><span id="brandSub">Роҳбарият · v1.2.0</span></div></div>
    <div class="nav">
      <button class="active" data-view="dashboard">📊 <span data-i18n="dashboard">Дашборд</span></button>
      <button data-view="merchants">🏪 <span data-i18n="merchants">Мерчанты</span></button>
      <button data-view="tasks">✅ <span data-i18n="tasks">Задачи</span></button>
      <button data-view="problems">⚠️ <span data-i18n="problems">Проблемные</span></button>
      <button data-view="analytics">📈 <span data-i18n="analytics">Аналитика</span></button>
      <button data-view="history">🕘 <span data-i18n="history">История</span></button>
    </div>
  </aside>
  <main class="main">
    <div class="top">
      <div><h2 id="pageTitle">Дашборд руководства</h2><small id="pageSub">Контроль мерчантов, менеджеров, задач и статусов</small></div>
      <div class="meta">
        <select class="lang" id="langSelect"><option value="ru">Русский</option><option value="tj">Тоҷикӣ</option></select>
        <span class="pill">v1.2.0</span>
        <button class="btn" onclick="loadData()">⟳ <span data-i18n="refresh">Обновить</span></button>
      </div>
    </div>
    <div id="viewRoot"></div>
  </main>
</div>

<div class="modal" id="modal"><div class="modal-card" id="modalCard"></div></div>
<div class="loader" id="loader"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<script>
const CONFIG = {
  API_URL: "", // вставьте сюда ссылку Google Apps Script Web App /exec
  APP_VERSION: "1.2.0",
  DEMO_IF_NO_API: true
};

const I18N = {
  ru:{
    dashboard:"Дашборд",merchants:"Мерчанты",tasks:"Задачи",problems:"Проблемные",analytics:"Аналитика",history:"История",refresh:"Обновить",
    pageDashboard:"Дашборд руководства",pageSub:"Контроль мерчантов, менеджеров, задач и статусов",
    total:"Всего мерчантов",active:"Активные",inWork:"В процессе",problem:"Проблемные",overdue:"Просрочено задач",
    clickAll:"Нажмите, чтобы открыть список",filter:"Открыть фильтр",addMerchant:"+ Добавить мерчанта",addTask:"+ Новая задача",
    merchant:"Мерчант",inn:"ИНН",city:"Город",manager:"Менеджер",product:"Продукт",status:"Статус",contract:"Договор",comments:"Комментарии",actions:"Действия",
    edit:"Редактировать",newTask:"Новая задача",save:"Сохранить",cancel:"Отмена",noData:"Нет данных",contractNo:"не заключен",
    productText:"Текст продукта",taskTitle:"Название задачи",taskFor:"Кому назначить",dueDate:"Срок",priority:"Приоритет",description:"Описание",
    contractNumber:"Номер договора",contractDate:"Дата договора",contactName:"Контактное лицо",phone:"Телефон",businessType:"Тип бизнеса",nextAction:"Следующее действие",nextDate:"Дата следующего действия",revenue:"Оборот",invoices:"Инвойсы"
  },
  tj:{
    dashboard:"Дашборд",merchants:"Мерчантҳо",tasks:"Вазифаҳо",problems:"Мушкилдор",analytics:"Таҳлил",history:"Таърих",refresh:"Навсозӣ",
    pageDashboard:"Дашборди роҳбарият",pageSub:"Назорати мерчантҳо, менеҷерҳо, вазифаҳо ва статусҳо",
    total:"Ҳамаи мерчантҳо",active:"Фаъол",inWork:"Дар раванд",problem:"Мушкилдор",overdue:"Вазифаҳои дершуда",
    clickAll:"Барои кушодани рӯйхат пахш кунед",filter:"Филтрро кушоед",addMerchant:"+ Иловаи мерчант",addTask:"+ Вазифаи нав",
    merchant:"Мерчант",inn:"РМА",city:"Шаҳр",manager:"Менеҷер",product:"Маҳсулот",status:"Статус",contract:"Шартнома",comments:"Шарҳҳо",actions:"Амалҳо",
    edit:"Таҳрир",newTask:"Вазифаи нав",save:"Сабт",cancel:"Бекор",noData:"Маълумот нест",contractNo:"баста нашудааст",
    productText:"Матни маҳсулот",taskTitle:"Номи вазифа",taskFor:"Ба кӣ супоридан",dueDate:"Муҳлат",priority:"Афзалият",description:"Тавсиф",
    contractNumber:"Рақами шартнома",contractDate:"Санаи шартнома",contactName:"Шахси масъул",phone:"Телефон",businessType:"Навъи бизнес",nextAction:"Амали навбатӣ",nextDate:"Санаи амали навбатӣ",revenue:"Гардиш",invoices:"Инвойсҳо"
  }
};

let state = {
  lang: localStorage.getItem("sp_lang") || "ru",
  view: "dashboard",
  merchants: [],
  tasks: [],
  history: [],
  filterStatus: "",
  filterText: ""
};

const demo = {
  merchants:[
    {id:"M1",merchant:"Fashion & StyleLife",inn:"045326994",city:"Душанбе",businessType:"Бутик / одежда",contactName:"Умед",phone:"900000000",manager:"Умед",product:"Интернет-эквайринг, QR invoice, SMS invoice, кабинет продавца, отчеты и акты сверки",status:"Активный",priority:"Высокий",nextAction:"Проверить обороты",nextDate:"2026-05-29",comment:"Запущены QR и SMS-ссылки, нужно проверить обороты за неделю.",contractNumber:"SP-102/26",contractDate:"2026-05-15",revenue:"124500",invoices:"84"},
    {id:"M2",merchant:"Padida Theatre",inn:"010203040",city:"Душанбе",businessType:"Услуги / мероприятия",contactName:"Гулом",phone:"911111111",manager:"Фирдавс",product:"Инвойсы через SMS, отчеты по оплатам, платежные ссылки для клиентов",status:"В работе",priority:"Средний",nextAction:"Получить документы",nextDate:"2026-05-24",comment:"Ожидаем документы и подтверждение реквизитов.",contractNumber:"SP-118/26",contractDate:"2026-05-22",revenue:"0",invoices:"0"},
    {id:"M3",merchant:"Korvon Market",inn:"998877665",city:"Душанбе",businessType:"Рынок / торговля",contactName:"Администрация",phone:"922222222",manager:"Команда",product:"QR-оплата для торговых точек, аналитика по павильонам, массовое подключение продавцов",status:"Проблемный",priority:"Высокий",nextAction:"Согласовать модель",nextDate:"2026-05-20",comment:"Нужно согласовать модель подключения и ответственных со стороны рынка.",contractNumber:"",contractDate:"",revenue:"0",invoices:"0"}
  ],
  tasks:[
    {id:"T1",merchantId:"M2",merchant:"Padida Theatre",title:"Запросить документы",assignee:"Фирдавс",priority:"Средний",dueDate:"2026-05-24",status:"Открыта",description:"Проверить реквизиты и документы"},
    {id:"T2",merchantId:"M3",merchant:"Korvon Market",title:"Встреча по QR",assignee:"Все",priority:"Высокий",dueDate:"2026-05-20",status:"Открыта",description:"Согласовать модель подключения"}
  ],
  history:[
    {date:"2026-05-22 15:30",user:"Система",action:"Создан демо-режим",object:"SmartPay CRM",details:"Версия v1.2.0"}
  ]
};

function t(k){return (I18N[state.lang] && I18N[state.lang][k]) || I18N.ru[k] || k}
function qs(s){return document.querySelector(s)}
function qsa(s){return [...document.querySelectorAll(s)]}
function showLoader(v){qs("#loader").classList.toggle("show",!!v)}
function toast(msg){const el=qs("#toast");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2600)}
function esc(v){return String(v??"").replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[s]))}
function todayISO(){return new Date().toISOString().slice(0,10)}
function fmtDate(v){
  if(!v) return "";
  const s=String(v);
  if(/^\d{4}-\d{2}-\d{2}/.test(s)){const [y,m,d]=s.slice(0,10).split("-");return `${d}.${m}.${y}`}
  return s.replace(/\sGMT.*$/,"").replace(/T.*$/,"");
}
function statusClass(s){
  s=String(s||"").toLowerCase();
  if(s.includes("актив")||s.includes("фаъол"))return"active";
  if(s.includes("проблем")||s.includes("мушкил"))return"problem";
  if(s.includes("ожид")||s.includes("интеграц")||s.includes("тест"))return"wait";
  if(s.includes("отказ")||s.includes("заморож"))return"off";
  return"work";
}
function priorityClass(s){
  s=String(s||"").toLowerCase();
  if(s.includes("выс")||s.includes("баланд"))return"priority-high";
  if(s.includes("низ")||s.includes("паст"))return"priority-low";
  return"priority-mid";
}
function isOverdue(d){return d && String(d).slice(0,10)<todayISO()}

async function api(action,payload={}){
  if(!CONFIG.API_URL){
    if(CONFIG.DEMO_IF_NO_API) return demo;
    throw new Error("API_URL пустой");
  }
  const res = await fetch(CONFIG.API_URL, {
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify({action,...payload})
  });
  const data = await res.json();
  if(!data.ok) throw new Error(data.message || "Ошибка API");
  return data;
}

async function loadData(){
  try{
    showLoader(true);
    const data = await api("getData");
    state.merchants = data.merchants || demo.merchants;
    state.tasks = data.tasks || demo.tasks;
    state.history = data.history || demo.history;
    render();
  }catch(e){
    console.error(e);
    toast("Ошибка загрузки, включен демо-режим");
    state.merchants=demo.merchants;state.tasks=demo.tasks;state.history=demo.history;render();
  }finally{showLoader(false)}
}

function setView(view, opts={}){
  state.view=view; state.filterStatus=opts.status||""; state.filterText=opts.text||"";
  qsa(".nav button").forEach(b=>b.classList.toggle("active",b.dataset.view===view));
  render();
}

function applyLang(){
  document.documentElement.lang=state.lang;
  qs("#langSelect").value=state.lang;
  qsa("[data-i18n]").forEach(el=>el.textContent=t(el.dataset.i18n));
  qs("#brandSub").textContent = (state.lang==="tj"?"Роҳбарият":"Руководство")+" · v"+CONFIG.APP_VERSION;
}

function render(){
  applyLang();
  const titles={dashboard:t("pageDashboard"),merchants:t("merchants"),tasks:t("tasks"),problems:t("problems"),analytics:t("analytics"),history:t("history")};
  qs("#pageTitle").textContent=titles[state.view]||t("pageDashboard");
  qs("#pageSub").textContent=t("pageSub");
  if(state.view==="dashboard") renderDashboard();
  if(state.view==="merchants") renderMerchants();
  if(state.view==="tasks") renderTasks();
  if(state.view==="problems") {state.filterStatus="Проблемный"; renderMerchants(true);}
  if(state.view==="analytics") renderAnalytics();
  if(state.view==="history") renderHistory();
}

function counts(){
  const m=state.merchants;
  return {
    total:m.length,
    active:m.filter(x=>String(x.status).toLowerCase().includes("актив")).length,
    work:m.filter(x=>["в работе","интеграц","тест","ожида"].some(s=>String(x.status).toLowerCase().includes(s))).length,
    problem:m.filter(x=>String(x.status).toLowerCase().includes("проблем")).length,
    overdue:state.tasks.filter(x=>String(x.status).toLowerCase()!=="закрыта" && isOverdue(x.dueDate)).length
  };
}

function renderDashboard(){
  const c=counts();
  qs("#viewRoot").innerHTML = `
    <section class="cards">
      <div class="card" onclick="setView('merchants')"><div class="label">${t("total")}</div><div class="num">${c.total}</div><div class="hint">${t("clickAll")}</div></div>
      <div class="card" onclick="setView('merchants',{status:'Активный'})"><div class="label">${t("active")}</div><div class="num green">${c.active}</div><div class="hint">${t("filter")}</div></div>
      <div class="card" onclick="setView('merchants',{status:'В работе'})"><div class="label">${t("inWork")}</div><div class="num orange">${c.work}</div><div class="hint">${t("filter")}</div></div>
      <div class="card" onclick="setView('problems')"><div class="label">${t("problem")}</div><div class="num red">${c.problem}</div><div class="hint">${t("filter")}</div></div>
      <div class="card" onclick="setView('tasks',{text:'overdue'})"><div class="label">${t("overdue")}</div><div class="num red">${c.overdue}</div><div class="hint">${t("filter")}</div></div>
    </section>
    <div class="grid2">
      <section class="panel"><div class="panel-head"><h3>${t("merchants")} — ${t("inWork")}</h3></div>${merchantTable(state.merchants.filter(x=>String(x.status).toLowerCase().includes("работ")).slice(0,6), true)}</section>
      <section class="panel"><div class="panel-head"><h3>${t("tasks")} — ${t("overdue")}</h3></div>${taskTable(state.tasks.filter(x=>isOverdue(x.dueDate)).slice(0,6))}</section>
    </div>`;
}

function merchantFilters(){
  const statuses=["","Новый","В работе","Ожидает документы","На интеграции","Тестирование","Активный","Проблемный","Заморожен","Отказ"];
  return `<div class="filters">
    <input id="searchInput" placeholder="Поиск: мерчант, ИНН, город..." value="${esc(state.filterText)}" oninput="state.filterText=this.value;renderMerchants()">
    <select onchange="state.filterStatus=this.value;renderMerchants()">${statuses.map(s=>`<option value="${esc(s)}" ${s===state.filterStatus?'selected':''}>${s||'Все статусы'}</option>`).join("")}</select>
    <button class="btn primary" onclick="openMerchantModal()">${t("addMerchant")}</button>
  </div>`;
}
function getFilteredMerchants(){
  const text=String(state.filterText||"").toLowerCase();
  return state.merchants.filter(m=>{
    const byStatus=!state.filterStatus || String(m.status||"").toLowerCase().includes(state.filterStatus.toLowerCase());
    const hay=[m.merchant,m.inn,m.city,m.manager,m.product,m.comment,m.contractNumber,m.contractDate].join(" ").toLowerCase();
    return byStatus && (!text || hay.includes(text));
  });
}
function renderMerchants(isProblem=false){
  const list=getFilteredMerchants();
  qs("#viewRoot").innerHTML = `<section class="panel"><div class="panel-head"><h3>${isProblem?t("problems"):t("merchants")}</h3><div class="actions"><button class="btn primary" onclick="openMerchantModal()">${t("addMerchant")}</button></div></div><div style="padding:16px 20px 0">${merchantFilters()}</div>${merchantTable(list)}</section>`;
}
function merchantTable(list, compact=false){
  if(!list.length) return `<div class="empty">${t("noData")}</div>`;
  return `<div class="table-wrap"><table><thead><tr>
    <th>${t("merchant")}</th><th>${t("inn")}</th><th>${t("city")}</th><th>${t("manager")}</th><th>${t("product")}</th><th>${t("status")}</th><th>${t("contract")}</th><th>${t("comments")}</th><th>${t("actions")}</th>
  </tr></thead><tbody>${list.map(m=>`
    <tr>
      <td><b>${esc(m.merchant)}</b><br><small>${esc(m.businessType||"")}</small></td>
      <td>${esc(m.inn)}</td><td>${esc(m.city)}</td><td class="manager">${esc(m.manager)}</td>
      <td><span class="truncate" title="${esc(m.product)}" onclick="openTextModal('${esc(m.merchant)}','${esc(m.product)}')">${esc(m.product||"")}</span></td>
      <td><span class="status ${statusClass(m.status)}">${esc(m.status||"")}</span></td>
      <td>${contractCell(m)}</td>
      <td class="comment" title="${esc(m.comment)}">${esc(m.comment||"")}</td>
      <td><button class="btn icon" data-tip="${t("edit")}" onclick="openMerchantModal('${esc(m.id)}')">✏️</button> <button class="btn icon" data-tip="${t("newTask")}" onclick="openTaskModal('${esc(m.id)}')">✅</button></td>
    </tr>`).join("")}</tbody></table></div>`;
}
function contractCell(m){
  const num=String(m.contractNumber||"").trim();
  const date=fmtDate(m.contractDate);
  if(!num && !date) return `<div class="contract"><b>—</b><small>${t("contractNo")}</small></div>`;
  return `<div class="contract"><b>${num?`№ ${esc(num)}`:"№ —"}</b><small>${date||t("contractNo")}</small></div>`;
}

function renderTasks(){
  let list=state.tasks;
  if(state.filterText==="overdue") list=list.filter(x=>isOverdue(x.dueDate));
  qs("#viewRoot").innerHTML=`<section class="panel"><div class="panel-head"><h3>${t("tasks")}</h3><div class="actions"><button class="btn primary" onclick="openTaskModal()">${t("addTask")}</button></div></div>${taskTable(list)}</section>`;
}
function taskTable(list){
  if(!list.length)return`<div class="empty">${t("noData")}</div>`;
  return `<div class="table-wrap"><table><thead><tr><th>${t("merchant")}</th><th>${t("taskTitle")}</th><th>${t("taskFor")}</th><th>${t("priority")}</th><th>${t("dueDate")}</th><th>${t("status")}</th><th>${t("description")}</th></tr></thead><tbody>${list.map(x=>`<tr>
  <td>${esc(x.merchant)}</td><td><b>${esc(x.title)}</b></td><td>${esc(x.assignee)}</td><td class="${priorityClass(x.priority)}">${esc(x.priority)}</td><td>${fmtDate(x.dueDate)} ${isOverdue(x.dueDate)?'⚠️':''}</td><td>${esc(x.status)}</td><td>${esc(x.description)}</td>
  </tr>`).join("")}</tbody></table></div>`;
}
function renderAnalytics(){
  const byManager=countBy(state.merchants,"manager"), byStatus=countBy(state.merchants,"status"), byProduct=countBy(state.merchants,"product");
  qs("#viewRoot").innerHTML=`<div class="grid3">
    ${chartPanel("По менеджерам",byManager)}
    ${chartPanel("По статусам",byStatus)}
    ${chartPanel("По продуктам",byProduct, true)}
  </div>`;
}
function countBy(arr,key){return arr.reduce((a,x)=>{const k=(x[key]||"Не указано").toString();a[k]=(a[k]||0)+1;return a},{})}
function chartPanel(title,obj,trunc=false){
  const max=Math.max(1,...Object.values(obj));
  return `<section class="panel"><div class="panel-head"><h3>${title}</h3></div><div class="chart-list">${Object.entries(obj).map(([k,v])=>`<div class="bar"><span title="${esc(k)}">${esc(trunc && k.length>18?k.slice(0,18)+"...":k)}</span><div class="bar-track"><div class="bar-fill" style="width:${v/max*100}%"></div></div><b>${v}</b></div>`).join("")}</div></section>`;
}
function renderHistory(){
  const list=state.history||[];
  qs("#viewRoot").innerHTML=`<section class="panel"><div class="panel-head"><h3>${t("history")}</h3></div>${!list.length?`<div class="empty">${t("noData")}</div>`:`<div class="table-wrap"><table><thead><tr><th>Дата</th><th>Пользователь</th><th>Действие</th><th>Объект</th><th>Детали</th></tr></thead><tbody>${list.map(x=>`<tr><td>${esc(x.date)}</td><td>${esc(x.user)}</td><td>${esc(x.action)}</td><td>${esc(x.object)}</td><td>${esc(x.details)}</td></tr>`).join("")}</tbody></table></div>`}</section>`;
}

function openTextModal(title,text){
  showModal(`<h3>${esc(title)}</h3><div class="field"><label>${t("productText")}</label><textarea readonly>${esc(text)}</textarea></div><div class="modal-actions"><button class="btn primary" onclick="closeModal()">ОК</button></div>`);
}
function openMerchantModal(id=""){
  const m=state.merchants.find(x=>x.id===id)||{};
  showModal(`<h3>${id?t("edit"):t("addMerchant")}</h3>
  <div class="grid2">
    ${field("merchant",t("merchant"),m.merchant)}
    ${field("inn",t("inn"),m.inn)}
    ${field("city",t("city"),m.city)}
    ${field("businessType",t("businessType"),m.businessType)}
    ${field("contactName",t("contactName"),m.contactName)}
    ${field("phone",t("phone"),m.phone)}
    ${field("manager",t("manager"),m.manager)}
    ${selectField("status",t("status"),m.status||"Новый",["Новый","В работе","Ожидает документы","На интеграции","Тестирование","Активный","Проблемный","Заморожен","Отказ"])}
    ${selectField("priority",t("priority"),m.priority||"Средний",["Низкий","Средний","Высокий"])}
    ${field("contractNumber",t("contractNumber"),m.contractNumber)}
    ${field("contractDate",t("contractDate"),m.contractDate,"date")}
    ${field("nextDate",t("nextDate"),m.nextDate,"date")}
    ${field("revenue",t("revenue"),m.revenue,"number")}
    ${field("invoices",t("invoices"),m.invoices,"number")}
  </div>
  ${textareaField("product",t("product"),m.product)}
  ${field("nextAction",t("nextAction"),m.nextAction)}
  ${textareaField("comment",t("comments"),m.comment)}
  <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">${t("cancel")}</button><button class="btn primary" onclick="saveMerchant('${esc(id)}')">${t("save")}</button></div>`);
}
function field(name,label,value="",type="text"){return `<div class="field"><label>${esc(label)}</label><input name="${name}" type="${type}" value="${esc(value)}"></div>`}
function textareaField(name,label,value=""){return `<div class="field"><label>${esc(label)}</label><textarea name="${name}">${esc(value)}</textarea></div>`}
function selectField(name,label,value,options){return `<div class="field"><label>${esc(label)}</label><select name="${name}">${options.map(o=>`<option ${o===value?'selected':''}>${esc(o)}</option>`).join("")}</select></div>`}

async function saveMerchant(id){
  const card=qs("#modalCard");
  const obj={id};
  card.querySelectorAll("[name]").forEach(el=>obj[el.name]=el.value);
  try{
    showLoader(true);
    if(CONFIG.API_URL) await api("saveMerchant",{merchant:obj});
    else {
      if(id){const i=state.merchants.findIndex(x=>x.id===id);state.merchants[i]={...state.merchants[i],...obj};}
      else state.merchants.push({...obj,id:"M"+Date.now()});
    }
    closeModal(); await loadData(); toast("Сохранено");
  }catch(e){toast(e.message)}finally{showLoader(false)}
}
function openTaskModal(merchantId=""){
  const m=state.merchants.find(x=>x.id===merchantId)||{};
  showModal(`<h3>${t("newTask")}</h3>
    ${field("title",t("taskTitle"),"")}
    <div class="grid2">
      ${field("merchant",t("merchant"),m.merchant||"")}
      ${field("merchantId","merchantId",m.id||"")}
      ${field("assignee",t("taskFor"),m.manager||"")}
      ${selectField("priority",t("priority"),"Средний",["Низкий","Средний","Высокий"])}
      ${field("dueDate",t("dueDate"),"","date")}
      ${selectField("status",t("status"),"Открыта",["Открыта","В работе","Закрыта"])}
    </div>
    ${textareaField("description",t("description"),"")}
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">${t("cancel")}</button><button class="btn primary" onclick="saveTask()">${t("save")}</button></div>`);
}
async function saveTask(){
  const obj={};
  qs("#modalCard").querySelectorAll("[name]").forEach(el=>obj[el.name]=el.value);
  try{
    showLoader(true);
    if(CONFIG.API_URL) await api("saveTask",{task:obj});
    else state.tasks.push({...obj,id:"T"+Date.now()});
    closeModal(); await loadData(); toast("Задача сохранена");
  }catch(e){toast(e.message)}finally{showLoader(false)}
}
function showModal(html){qs("#modalCard").innerHTML=html;qs("#modal").classList.add("show")}
function closeModal(){qs("#modal").classList.remove("show");qs("#modalCard").innerHTML=""}
qs("#modal").addEventListener("click",e=>{if(e.target.id==="modal")closeModal()});
qsa(".nav button").forEach(b=>b.addEventListener("click",()=>setView(b.dataset.view)));
qs("#langSelect").addEventListener("change",e=>{state.lang=e.target.value;localStorage.setItem("sp_lang",state.lang);render()});
loadData();
</script>
</body>
</html>
